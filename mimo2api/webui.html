<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimo2 控制面板</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --danger: #EF4444;
            --danger-hover: #DC2626;
            --bg-color: #F3F4F6;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.4);
            --text-main: #111827;
            --text-muted: #6B7280;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .hidden {
            display: none !important;
        }

        .auth-shell {
            width: 100%;
            max-width: 460px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 12px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            color: #1e1b4b;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .badge {
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.7);
            color: #3730A3;
            border: 1px solid rgba(79, 70, 229, 0.15);
        }

        .badge.warn {
            color: #92400E;
            border-color: rgba(245, 158, 11, 0.25);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .status-indicator {
            width: 14px;
            height: 14px;
            background: #10B981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10B981;
            animation: pulse 2s infinite;
        }

        .status-indicator.offline {
            background: #EF4444;
            box-shadow: 0 0 10px #EF4444;
            animation: none;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .status-text {
            font-size: 18px;
            font-weight: 500;
        }

        .status-subtext {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .login-title {
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 600;
            color: #1e1b4b;
        }

        .login-copy {
            margin: 0 0 24px 0;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .text-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(99, 102, 241, 0.18);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .text-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        
        .btn-danger { background: white; color: var(--danger); border: 1px solid #fca5a5; }
        .btn-danger:hover { background: #fef2f2; color: var(--danger-hover); border-color: #f87171; }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background: rgba(255, 255, 255, 0.5);
        }

        th, td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        th {
            background: rgba(243, 244, 246, 0.5);
            font-weight: 600;
            color: var(--text-muted);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-size: 14px;
            color: #374151;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-title { margin: 0 0 16px 0; font-size: 20px; font-weight: 600; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #374151; }
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            resize: vertical;
            min-height: 100px;
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.4;}
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-outline { background: transparent; border: 1px solid #D1D5DB; color: #4B5563; }
        .btn-outline:hover { background: #F3F4F6; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-left: 4px solid var(--primary);
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2000;
            font-size: 14px;
            font-weight: 500;
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--danger); color: var(--danger); }
        .toast.success { border-left-color: #10B981; color: #047857; }

        @media (max-width: 720px) {
            body {
                padding: 24px 14px;
            }

            .header {
                align-items: flex-start;
                flex-direction: column;
            }

            .header-meta {
                justify-content: flex-start;
            }

            .glass-card,
            .modal {
                padding: 18px;
            }

            th, td {
                padding: 12px;
            }
        }

    </style>
</head>
<body>
    <div id="authShell" class="auth-shell hidden">
        <div class="glass-card">
            <h1 class="login-title">Mimo2 Center</h1>
            <p class="login-copy">这个面板现在需要登录后才能查看和管理节点账号。</p>
            <div class="auth-form">
                <div>
                    <label class="form-label" for="loginUsername">用户名</label>
                    <input id="loginUsername" class="text-input" autocomplete="username" />
                </div>
                <div>
                    <label class="form-label" for="loginPassword">密码</label>
                    <input id="loginPassword" class="text-input" type="password" autocomplete="current-password" />
                </div>
                <button class="btn" onclick="submitLogin()">登录</button>
            </div>
        </div>
    </div>

    <div id="appShell" class="container hidden">
        <div class="header">
            <h1>Mimo2 Center</h1>
            <div class="header-meta">
                <span id="webAuthBadge" class="badge">WebUI 未鉴权</span>
                <span id="aiAuthBadge" class="badge warn">AI 端点未鉴权</span>
                <button id="logoutBtn" class="btn btn-outline hidden" onclick="logout()">退出登录</button>
            </div>
        </div>

        <!-- 状态卡片 -->
        <div class="glass-card">
            <div>
                <div class="status-container">
                    <div id="statusIndicator" class="status-indicator"></div>
                    <div>
                        <div class="status-text">网关运行中</div>
                        <div class="status-subtext" id="statusText">正在获取实时数据...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户管理卡片 -->
        <div class="glass-card">
            <div class="flex-between">
                <h2 style="margin: 0; font-size: 18px;">Claw 运行账号管理</h2>
                <div style="display:flex; gap:8px; align-items:center;">
                    <button class="btn btn-outline" onclick="rebuildSelected()" id="rebuildSelectedBtn" style="display:none;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                        重建勾选
                    </button>
                    <button class="btn" onclick="openModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        导入凭证
                    </button>
                </div>
            </div>
            
            <div class="table-wrapper">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th style="width:40px;text-align:center;">
                                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" title="全选/反选">
                            </th>
                            <th>用户 ID (User ID)</th>
                            <th>备注名</th>
                            <th>实例状态 / 剩余时长</th>
                            <th>ServiceToken 简览</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr><td colspan="6" class="empty-state">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <!-- 分页器 -->
            <div id="paginationBar" style="display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding:0 4px; font-size:13px; color:var(--text-muted);">
                <span id="pageInfo"></span>
                <div style="display:flex; gap:8px; align-items:center;">
                    <select id="pageSizeSelect" onchange="changePageSize()" style="padding:4px 8px; border-radius:6px; border:1px solid #D1D5DB; font-size:13px; cursor:pointer;">
                        <option value="5">5 条/页</option>
                        <option value="10">10 条/页</option>
                        <option value="20">20 条/页</option>
                        <option value="50">50 条/页</option>
                        <option value="100">100 条/页</option>
                    </select>
                    <button class="btn btn-outline" id="prevPageBtn" onclick="prevPage()" style="padding:4px 10px; font-size:12px;">上一页</button>
                    <span id="pageNum" style="min-width:60px; text-align:center;"></span>
                    <button class="btn btn-outline" id="nextPageBtn" onclick="nextPage()" style="padding:4px 10px; font-size:12px;">下一页</button>
                </div>
            </div>
        </div>

        <!-- 代理池配置 -->
        <div class="glass-card" style="padding: 16px 24px;">
            <div style="display:flex; gap:10px; align-items:center; flex-wrap: wrap;">
                <h2 style="margin: 0; font-size: 16px; white-space: nowrap;">代理池配置</h2>
                <input type="text" id="proxyInput" class="form-control" placeholder="http://user:pass@ip:port (留空则不使用代理)" style="flex:1; margin:0; min-height:auto; height:38px; resize:none;">
                <button class="btn" onclick="saveProxy()">保存</button>
                <button class="btn btn-outline" onclick="testProxy()">测试连通</button>
            </div>
            <div id="proxyStatus" style="margin-top: 6px; font-size: 12px; color: var(--text-muted); padding-left: 90px;"></div>
        </div>

        <!-- Manager 日志窗口 -->
        <div class="glass-card" id="logCard">
            <div class="flex-between" style="margin-bottom: 12px;">
                <h2 style="margin: 0; font-size: 18px;">实例管理日志</h2>
                <div style="display:flex; gap:8px; align-items:center;">
                    <button class="btn btn-outline" id="logCopyBtn" onclick="copyLogs()" title="复制全部日志">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        复制日志
                    </button>
                    <button id="logScrollLock" onclick="toggleLogScroll()" title="点击锁定/解锁自动滚动" style="padding:8px 14px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; display:inline-flex; align-items:center; gap:6px; background:#10b981; color:#fff;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        自动滚动
                    </button>
                    <button class="btn btn-outline" onclick="clearLogs()">清空</button>
                </div>
            </div>
            <div id="logContainer" style="height: 300px; overflow-y: auto; background: #1e1e2e; border-radius: 8px; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; color: #cdd6f4; line-height: 1.6;">
                <div id="logContent">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 导入弹窗 -->
    <div class="modal-overlay" id="importModal">
        <div class="modal">
            <h3 class="modal-title">导入 Xiaomi 凭证</h3>
            <div class="form-group">
                <label class="form-label">Cookie / 凭证数据字符串</label>
                <textarea id="cookieInput" class="form-control" placeholder='例如: serviceToken="vjQ..."; userId=686621...; xiaomichatbot_ph="6vv..."'></textarea>
                <div class="form-hint">支持自动解析多格式文本，需至少包含 <code>userId</code>, <code>serviceToken</code> 及 <code>xiaomichatbot_ph</code>。系统会自动提取值。</div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal()">取消</button>
                <button class="btn" onclick="submitImport()">确认导入</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let statusInterval;
        let webAuthEnabled = false;
        let webAuthReady = false;
        let preferredUsername = 'admin';

        function showToast(msg, type='success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast show ${type}`;
            setTimeout(() => { el.className = `toast ${type}`; }, 3000);
        }

        function setShellVisibility(showApp) {
            document.getElementById('appShell').classList.toggle('hidden', !showApp);
            document.getElementById('authShell').classList.toggle('hidden', showApp);
        }

        function applyAuthBadges(session) {
            const webBadge = document.getElementById('webAuthBadge');
            const aiBadge = document.getElementById('aiAuthBadge');
            const logoutBtn = document.getElementById('logoutBtn');

            webBadge.textContent = session.enabled ? `WebUI 已鉴权 · ${session.username}` : 'WebUI 未鉴权';
            webBadge.className = `badge${session.enabled ? '' : ' warn'}`;
            aiBadge.textContent = session.ai_auth_enabled ? 'AI 端点已鉴权' : 'AI 端点未鉴权';
            aiBadge.className = `badge${session.ai_auth_enabled ? '' : ' warn'}`;
            logoutBtn.classList.toggle('hidden', !session.enabled);
        }

        async function fetchSession() {
            const res = await fetch('/api/auth/session', { credentials: 'same-origin' });
            if (!res.ok) {
                throw new Error('获取登录状态失败');
            }
            const session = await res.json();
            webAuthEnabled = !!session.enabled;
            preferredUsername = session.username || 'admin';
            document.getElementById('loginUsername').value = preferredUsername;
            applyAuthBadges(session);
            return session;
        }

        async function apiFetch(url, options = {}) {
            const opts = { credentials: 'same-origin', ...options };
            const res = await fetch(url, opts);
            if (res.status === 401) {
                const wasAuthenticated = webAuthReady;
                webAuthReady = false;
                setShellVisibility(false);
                // 仅在会话过期（之前已登录）时清空密码，未登录状态下不干扰用户输入
                if (wasAuthenticated) {
                    document.getElementById('loginPassword').value = '';
                }
                showToast('登录已失效，请重新登录', 'error');
                throw new Error('UNAUTHORIZED');
            }
            return res;
        }

        function startStatusPolling() {
            if (statusInterval) {
                clearInterval(statusInterval);
            }
            statusInterval = setInterval(() => {
                if (webAuthReady || !webAuthEnabled) {
                    fetchStatus();
                    fetchManagerLogs();
                }
            }, 3000);
        }

        async function fetchStatus() {
            // 认证开启但未登录时，跳过状态请求（避免 401 清空密码输入框）
            if (webAuthEnabled && !webAuthReady) return;
            try {
                const res = await apiFetch('/api/system/status');
                const data = await res.json();
                const indicator = document.getElementById('statusIndicator');
                const text = document.getElementById('statusText');
                
                if (data.active_clients > 0) {
                    indicator.className = 'status-indicator';
                    text.textContent = `内网通信节点保持连接: ${data.active_clients} 个`;
                } else {
                    indicator.className = 'status-indicator offline';
                    text.textContent = `危险！没有任何一个内网节点在线，所有 API 请求将被退回`;
                }
            } catch(e) {
                if (e.message === 'UNAUTHORIZED') {
                    return;
                }
                document.getElementById('statusIndicator').className = 'status-indicator offline';
                document.getElementById('statusText').textContent = '后端连接失败';
            }
        }

        // ===== 分页状态 =====
        let allUsers = [];
        let currentPage = 1;
        let pageSize = 5;

        function renderUsersPage() {
            const tbody = document.getElementById('usersBody');
            const totalPages = Math.ceil(allUsers.length / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageUsers = allUsers.slice(start, end);

            if (pageUsers.length > 0) {
                tbody.innerHTML = pageUsers.map(u => `
                    <tr>
                        <td style="text-align:center;"><input type="checkbox" class="user-checkbox" value="${u.userId}" onchange="updateRebuildBtn()"></td>
                        <td><strong style="color:var(--primary)">${u.userId}</strong></td>
                        <td>${u.name || '(未命名)'}</td>
                        <td>
                            <div><strong style="color: ${u.claw_status === 'AVAILABLE' ? '#10B981' : (u.claw_status === 'EXPIRED(401)' ? '#EF4444' : '#F59E0B')}">${u.claw_status || '未知'}</strong></div>
                            <div class="countdown-text" data-remain="${u.remain_sec}" style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">
                                ${u.remain_sec > 0 ? '剩余: ' + Math.floor(u.remain_sec / 60) + ' 分 ' + (u.remain_sec % 60) + ' 秒' : '已过期/无环境'}
                            </div>
                        </td>
                        <td>
                            <span style="display:inline-block; max-width: 120px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color: var(--text-muted);">
                                ${u.serviceToken ? u.serviceToken.substring(0,10)+'...' : '无效'}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-danger" onclick="deleteUser('${u.userId}')">删除</button>
                        </td>
                    </tr>
                `).join('');
                updateRebuildBtn();
            } else {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">当前未加载任何凭证</td></tr>';
            }

            // 更新分页信息
            document.getElementById('pageInfo').textContent = `共 ${allUsers.length} 个账号`;
            document.getElementById('pageNum').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prevPageBtn').disabled = currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
        }

        function changePageSize() {
            pageSize = parseInt(document.getElementById('pageSizeSelect').value);
            currentPage = 1;
            renderUsersPage();
        }

        function prevPage() {
            if (currentPage > 1) { currentPage--; renderUsersPage(); }
        }

        function nextPage() {
            const totalPages = Math.ceil(allUsers.length / pageSize) || 1;
            if (currentPage < totalPages) { currentPage++; renderUsersPage(); }
        }

        async function fetchUsers() {
            try {
                const res = await apiFetch('/api/users/list');
                const data = await res.json();
                
                if (data.users && data.users.length > 0) {
                    allUsers = data.users;
                } else {
                    allUsers = [];
                }
                renderUsersPage();
            } catch(e) {
                if (e.message !== 'UNAUTHORIZED') {
                    console.error("加载用户列表失败", e);
                }
            }
        }

        async function deleteUser(uid) {
            if(!confirm(`确定要移除账号 ${uid} 吗？\n删除后下一次轮换将不再拉起该账号的请求。`)) return;
            try {
                const res = await apiFetch(`/api/users/delete/${uid}`, {method: 'DELETE'});
                if(res.ok) {
                    showToast('删除成功');
                    fetchUsers();
                } else {
                    showToast('删除失败: '+ (await res.text()), 'error');
                }
            } catch(e) {
                showToast('网络请求异常', 'error');
            }
        }

        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = checked);
            updateRebuildBtn();
        }

        function updateRebuildBtn() {
            const checked = document.querySelectorAll('.user-checkbox:checked');
            const btn = document.getElementById('rebuildSelectedBtn');
            btn.style.display = checked.length > 0 ? 'inline-flex' : 'none';
        }

        async function rebuildSelected() {
            const checked = document.querySelectorAll('.user-checkbox:checked');
            if (checked.length === 0) return;
            const uids = Array.from(checked).map(cb => cb.value);
            if (!confirm(`确定要重建以下 ${uids.length} 个账号的容器？\n${uids.join(', ')}`)) return;
            
            let success = 0, fail = 0;
            for (const uid of uids) {
                try {
                    const res = await apiFetch(`/api/rebuild/${uid}`, {method: 'POST'});
                    if (res.ok) success++;
                    else fail++;
                } catch(e) { fail++; }
            }
            showToast(`重建信号已发送: ${success} 成功, ${fail} 失败`);
            document.getElementById('selectAll').checked = false;
            document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = false);
            updateRebuildBtn();
        }

        // ===== Manager 日志窗口 =====
        let logAutoScroll = true;
        let logLastCount = 0;

        async function fetchManagerLogs() {
            try {
                const res = await apiFetch('/api/manager-logs?limit=100');
                const data = await res.json();
                const container = document.getElementById('logContent');
                
                if (data.logs && data.logs.length > 0) {
                    if (data.count !== logLastCount) {
                        logLastCount = data.count;
                        container.innerHTML = data.logs.map(l => {
                            const time = new Date(l.ts * 1000).toLocaleTimeString('zh-CN', {hour12: false});
                            const levelColor = l.level === 'ERROR' ? '#f38ba8' : l.level === 'WARNING' ? '#fab387' : '#a6e3a1';
                            const name = l.name.replace('Acc-', '');
                            return `<div><span style="color:#89b4fa">${time}</span> <span style="color:${levelColor}">[${l.level}]</span> <span style="color:#cba6f7">${name}</span> ${escapeHtml(l.msg)}</div>`;
                        }).join('');
                        
                        if (logAutoScroll) {
                            const logContainer = document.getElementById('logContainer');
                            logContainer.scrollTop = logContainer.scrollHeight;
                        }
                    }
                }
            } catch(e) {
                if (e.message !== 'UNAUTHORIZED') console.error("加载日志失败", e);
            }
        }

        function toggleLogScroll() {
            logAutoScroll = !logAutoScroll;
            const btn = document.getElementById('logScrollLock');
            if (logAutoScroll) {
                btn.style.background = '#10b981';
                btn.style.color = '#fff';
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> 自动滚动';
                // 立即滚到底部
                const container = document.getElementById('logContainer');
                container.scrollTop = container.scrollHeight;
            } else {
                btn.style.background = '#ef4444';
                btn.style.color = '#fff';
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 5-5 5 5 0 0 1 5 5v4"></path></svg> 已锁定';
            }
        }

        async function copyLogs() {
            const logContent = document.getElementById('logContent');
            const text = logContent.innerText || logContent.textContent;
            try {
                await navigator.clipboard.writeText(text);
                showToast('日志已复制到剪贴板', 'success');
            } catch (e) {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                showToast('日志已复制到剪贴板', 'success');
            }
        }

        function clearLogs() {
            document.getElementById('logContent').innerHTML = '';
            logLastCount = 0;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== 代理池配置 =====
        async function loadProxy() {
            try {
                const res = await apiFetch('/api/proxy');
                const data = await res.json();
                document.getElementById('proxyInput').value = data.proxy_url || '';
            } catch(e) {}
        }

        async function saveProxy() {
            const url = document.getElementById('proxyInput').value.trim();
            try {
                const res = await apiFetch('/api/proxy', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({proxy_url: url})
                });
                if (res.ok) {
                    showToast(url ? '代理已保存' : '代理已清除（直连模式）');
                    document.getElementById('proxyStatus').textContent = '';
                } else {
                    showToast('保存失败', 'error');
                }
            } catch(e) {
                showToast('网络异常', 'error');
            }
        }

        async function testProxy() {
            const url = document.getElementById('proxyInput').value.trim();
            const statusEl = document.getElementById('proxyStatus');
            statusEl.textContent = '测试中...';
            statusEl.style.color = 'var(--text-muted)';
            try {
                const res = await apiFetch('/api/proxy/test', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({proxy_url: url})
                });
                const data = await res.json();
                if (data.ok) {
                    statusEl.textContent = '✅ ' + data.message;
                    statusEl.style.color = '#10B981';
                } else {
                    statusEl.textContent = '❌ ' + (data.error || '连接失败');
                    statusEl.style.color = '#EF4444';
                }
            } catch(e) {
                statusEl.textContent = '❌ 请求异常: ' + e.message;
                statusEl.style.color = '#EF4444';
            }
        }

        function openModal() {
            document.getElementById('cookieInput').value = '';
            document.getElementById('importModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('importModal').classList.remove('active');
        }

        async function submitLogin() {
            const username = document.getElementById('loginUsername').value.trim() || preferredUsername;
            const password = document.getElementById('loginPassword').value;
            if (!password) {
                showToast('密码不能为空', 'error');
                return;
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    showToast(data.detail || '登录失败', 'error');
                    return;
                }
                webAuthReady = true;
                document.getElementById('loginPassword').value = '';
                setShellVisibility(true);
                showToast('登录成功');
                await initializeDashboard();
            } catch (e) {
                showToast('登录请求失败', 'error');
            }
        }

        async function logout() {
            try {
                await fetch('/api/auth/logout', {
                    method: 'POST',
                    credentials: 'same-origin'
                });
            } finally {
                webAuthReady = false;
                setShellVisibility(false);
                document.getElementById('loginPassword').value = '';
            }
        }

        async function submitImport() {
            const val = document.getElementById('cookieInput').value;
            if(!val.trim()) {
                showToast('输入不能为空', 'error'); return;
            }

            try {
                const res = await apiFetch('/api/users/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ raw_text: val })
                });
                
                const data = await res.json();
                if(res.ok) {
                    showToast(`成功提取并存入 userId: ${data.userId}`);
                    closeModal();
                    fetchUsers();
                } else {
                    showToast(data.detail || '解析缺少必要字段', 'error');
                }
            } catch(e) {
                if (e.message !== 'UNAUTHORIZED') {
                    showToast('提交异常', 'error');
                }
            }
        }

        async function initializeDashboard() {
            await Promise.all([fetchStatus(), fetchUsers(), loadProxy()]);
            startStatusPolling();
        }

        async function bootstrap() {
            try {
                const session = await fetchSession();
                if (session.enabled && !session.authenticated) {
                    setShellVisibility(false);
                    return;
                }
                webAuthReady = true;
                setShellVisibility(true);
                await initializeDashboard();
            } catch (e) {
                setShellVisibility(false);
                showToast('初始化失败，请刷新重试', 'error');
            }
        }
        
        // 本地纯前端倒计时（不消耗任何网络请求）
        setInterval(() => {
            document.querySelectorAll('.countdown-text').forEach(el => {
                let remain = parseInt(el.getAttribute('data-remain'));
                if (remain > 0) {
                    remain--;
                    el.setAttribute('data-remain', remain);
                    el.textContent = '剩余: ' + Math.floor(remain / 60) + ' 分 ' + (remain % 60) + ' 秒';
                } else if (remain === 0 && el.textContent.includes('剩余')) {
                    el.textContent = '即将或已过期...';
                }
            });
        }, 1000);

        window.addEventListener('DOMContentLoaded', bootstrap);

    </script>
</body>
</html>
